name: lottery-platform-dev-tools

services:
  nexus:
    image: sonatype/nexus3:${NEXUS_IMAGE_TAG:-3.84.1}
    container_name: lottery-nexus
    restart: unless-stopped
    environment:
      INSTALL4J_ADD_VM_PARAMS: >-
        -Xms${NEXUS_JAVA_MIN_HEAP:-512m}
        -Xmx${NEXUS_JAVA_MAX_HEAP:-512m}
        -XX:MaxDirectMemorySize=${NEXUS_JAVA_DIRECT_MEM:-512m}
        -Djava.util.prefs.userRoot=/nexus-data/javaprefs
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
    ports:
      - "${NEXUS_HTTP_PORT:-8081}:8081"
    volumes:
      - ../docker/data/nexus:/nexus-data
    networks:
      - lottery-net

  jenkins:
    build:
      context: ../docker
      dockerfile: build/jenkins/Dockerfile
      args:
        JENKINS_BASE_IMAGE: jenkins/jenkins:${JENKINS_IMAGE_TAG:-lts-jdk21}
        MAVEN_VERSION: ${MAVEN_VERSION:-3.9.11}
        NODE_MAJOR: ${NODE_MAJOR:-22}
    image: lottery-jenkins:${JENKINS_IMAGE_TAG:-lts-jdk21}
    container_name: lottery-jenkins
    restart: unless-stopped
    environment:
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
      JENKINS_OPTS: --httpPort=8080
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-123456}
    ports:
      - "${JENKINS_HTTP_PORT:-9200}:8080"
      - "${JENKINS_AGENT_PORT:-9201}:50000"
    volumes:
      - ../docker/data/jenkins:/var/jenkins_home
      - ../docker/conf/jenkins/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d:ro
    networks:
      - lottery-net

networks:
  lottery-net:
    driver: bridge
